<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Panorama Loop</title>

<style>
html,body{
    margin:0;
    overflow:hidden;
    background:#000;
}

#viewport{
    width:100vw;
    height:100vh;
    overflow:hidden;
}

#track{
    display:flex;
    height:100vh;
    animation: scroll 30s linear infinite;
}

#track img{
    height:100vh;
    width:auto;
    flex-shrink:0;
}

@keyframes scroll{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(-50%);
    }
}
</style>
</head>
<body>

<div id="viewport">
    <div id="track">
        <img src="panorama.png">
        <img src="panorama.png">
    </div>
</div>

</body>
</html>
