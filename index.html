<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Slit Panorama</title>

<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
}

#viewport {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
}

#track {
    display: flex;
    height: 100vh;
    will-change: transform;
}

#track img {
    height: 100vh;
    width: auto;
    flex-shrink: 0;
}
</style>
</head>

<body>

<div id="viewport">
    <div id="track"></div>
</div>

<script>
const track = document.getElementById("track");

// 1～26を読み込み
for(let i=1;i<=26;i++){
    const img=document.createElement("img");
    img.src=`slit2f-2-${i}.jpg`;
    track.appendChild(img);
}

// 無限ループ用に複製
for(let i=1;i<=26;i++){
    const img=document.createElement("img");
    img.src=`slit2f-2-${i}.jpg`;
    track.appendChild(img);
}

let offset = 0;
let firstWidth = 0;

// 600秒で1周(10分)
const LOOP_TIME = 6000000;

window.onload = () => {

    const imgs = track.querySelectorAll("img");

    Promise.all(
        [...imgs].map(img =>
            img.complete
            ? Promise.resolve()
            : new Promise(r => img.onload = r)
        )
    ).then(() => {

        // 元の26枚分の総幅
        for(let i=0;i<26;i++){
            firstWidth += imgs[i].offsetWidth;
        }

        let lastTime = performance.now();

        function animate(now){

            const delta = now - lastTime;
            lastTime = now;

            const speed = firstWidth / LOOP_TIME;

            offset += speed * delta;

            if(offset >= firstWidth){
                offset -= firstWidth;
            }

            track.style.transform =
                `translateX(${-offset}px)`;

            requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);
    });
};
</script>

</body>
</html>
